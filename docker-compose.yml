version: "3.8"
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: ${POSTGRES_DB_PROD}
      POSTGRES_USER: ${POSTGRES_USER_PROD}
      POSTGRES_PASSWORD: ${POSTGRES_PASS_PROD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - Gotreenet

  api:
    image: relatorios-api:prod
    ports:
      - "8080:8081"
    volumes:
      - reports_data:/app-data/reports
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://relatorios_db:5432/${POSTGRES_DB_PROD}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER_PROD}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASS_PROD}
      - SERVER_PORT=8081
      - SPRING_PROFILES_ACTIVE=prod
      - JWT_SECRET_PATH=${JWT_SECRET_PATH}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - CRYPTO_SECRET_KEY=${CRYPTO_SECRET_KEY}
    secrets:
      - jwt_secret_v2
    deploy:
      labels:
        - traefik.enable=true
        - traefik.docker.network=Gotreenet
        - traefik.http.routers.relatorios-api.rule=Host(`relatorios.gotree.site`) && PathPrefix(`/api`)
        - traefik.http.routers.relatorios-api.entrypoints=websecure
        - traefik.http.routers.relatorios-api.tls.certresolver=letsencrypt
        - traefik.http.services.relatorios-api.loadbalancer.server.port=8081
    networks:
      - Gotreenet

volumes:
  postgres_data:
  reports_data:

networks:
  Gotreenet:
    external: true

secrets:
  jwt_secret_v2:
    external: true
